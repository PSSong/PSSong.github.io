name: WorldLens Satellites Update

on:
  schedule:
    - cron: '0 * * * *'   # 매 정시 (1시간 주기)
  workflow_dispatch:       # 수동 실행 버튼

permissions:
  contents: write          # positions.json 커밋용

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/worldlens/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/worldlens/requirements.txt

      - name: Collect satellite positions
        run: python scripts/worldlens/collect_satellites.py

      - name: Commit updated positions.json
        run: |
          git config user.name  "worldlens-bot"
          git config user.email "worldlens-bot@users.noreply.github.com"
          git add static/worldlens/positions.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(worldlens): positions.json update $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
