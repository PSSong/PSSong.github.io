{{- define "main" }}
{{- $js := resources.Get "js/explore.js" | js.Build (dict "minify" true "target" "es2017") }}
<div class="xp-page">
  <header class="xp-header">
    <h1 class="xp-h1">{{ .Title }}</h1>
    <p class="xp-desc">Select tags to discover overlapping narratives and track directional shifts.</p>
  </header>

  <section class="xp-selector" aria-label="Tag selector">
    <div class="xp-search-row">
      <input id="xp-input" class="xp-input" type="search" placeholder="Search tags…" autocomplete="off" aria-label="Search tags" />
      <button id="xp-clear" class="xp-clear-btn" type="button" aria-label="Clear selection">Clear</button>
    </div>
    <div id="xp-chips" class="xp-chips" role="group" aria-label="Available tags"></div>
    <button id="xp-toggle" class="xp-toggle-btn" type="button" style="display:none"></button>
  </section>

  <section id="xp-result" class="xp-result" aria-live="polite" aria-label="Article results">
    <p class="xp-hint">Select tags above to explore narratives.</p>
  </section>
</div>
<script src="{{ $js.RelPermalink }}" defer></script>
{{- end }}
